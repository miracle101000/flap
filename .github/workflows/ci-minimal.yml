name: CI — minimal

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: clippy
      - name: Cargo build
        run: cargo build --workspace --verbose
      - name: Cargo test
        run: cargo test --workspace --verbose
      - name: Run emitter (smoke)
        run: |
          mkdir -p examples/generated
          cargo run --bin generate_dart -- --spec examples/petstore.yaml --out examples/generated/petstore
      - name: Assert generated files exist
        run: |
          test -f examples/generated/petstore/lib/flap_utils.dart
