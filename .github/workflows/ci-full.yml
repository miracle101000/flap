name: CI — full (Rust + Dart)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Cargo build & test
        run: |
          cargo build --workspace --verbose
          cargo test --workspace --verbose

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'

      - name: Run emitter
        run: |
          cargo run --bin generate_dart -- --spec examples/petstore.yaml --out examples/generated/petstore

      - name: Get Dart dependencies
        working-directory: examples/generated/petstore
        run: dart pub get

      - name: Run build_runner to generate freezed/json_serializable parts
        working-directory: examples/generated/petstore
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart analyze
        working-directory: examples/generated/petstore
        run: dart analyze
